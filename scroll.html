<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <style>
        body {
            padding: 0;
            margin: 0;
        }
    </style>
</head>
<body>
  <script>
 




    

  var backgroundUpdateInterval = 3;
  var yellowColor, blueColor;

  function setup() {
    createCanvas(windowWidth, 6000);
    yellowColor = color(255, 251, 220);
    blueColor = color(0, 0, 181);
  }

  function draw() {
  normalizedScrollY = map(window.scrollY, 0, document.body.scrollHeight - window.innerHeight, 0, 1);
    
   let currentColor;
   if (normalizedScrollY < 0.48) {
      currentColor = yellowColor;
   } else if (normalizedScrollY < 0.5) {
      let percent = (normalizedScrollY - 0.48) / 0.02;
      currentColor = lerpColor(yellowColor, blueColor, percent);
   } else if (normalizedScrollY < 0.98) {
      let percent = (normalizedScrollY - 0.5) / 0.48;
      currentColor = blueColor;
   } else {
      let percent = (normalizedScrollY - 0.98) / 0.02;
      currentColor = lerpColor(blueColor, yellowColor, percent);
   }
   background(currentColor);



  if (frameCount % backgroundUpdateInterval === 0) {
    background(currentColor);
  }
  if (normalizedScrollY < 0.5) {
    fill(blueColor);
    noStroke();
  circle(mouseX, mouseY, 10);
  stroke(blueColor);
  line(pmouseX, pmouseY,mouseX, mouseY);
  } else {
    fill(yellowColor);
    noStroke();
  circle(mouseX, mouseY, 10);
  stroke(yellowColor);
  line(pmouseX, pmouseY,mouseX, mouseY);
  }


console.log(scrollY);





 
  if (normalizedScrollY >= 1) {
    window.scrollTo(0, 0);
} else if (normalizedScrollY <= 0) {
    window.scrollTo(0, document.body.scrollHeight);
}
  
  if (normalizedScrollY >= 1) {
    window.scrollTo(0, 0);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, 5000);
}
    

    </script>
</body>
</html>

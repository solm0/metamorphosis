<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        body {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background-color: rgb(236, 238, 197);
            overflow: hidden;
            cursor: none;
        }

    </style>
</head>
<body>
    div.


    <script>
        function setup() {
            createCanvas(windowWidth, windowHeight);
            blueColor = color(5,6,237);
            yellowColor = color(236, 238, 197);
            }

            function draw() {
            background(yellowColor);

            
            //first rec
            
            noStroke();
            fill(blueColor);
            let rectHeight1 = map(sin(frameCount * 0.01), -1, 1, windowHeight * 0.1, windowHeight * 0.75);
            rect(0, 0, windowWidth, rectHeight1);
            
            
            //second rec
            
            let rectHeight2 = map(sin(frameCount * 0.01), -1, 1, windowHeight * 0.3, windowHeight * 0.08);
            
            let startColor = blueColor;
            let endColor = yellowColor;
            
            let startY = rectHeight1;
            let endY = startY + rectHeight2;
            
            for (let y = startY; y < endY; y++) {
                let inter = map(y, startY, endY, 0, 1);
                let gradientColor = lerpColor(startColor, endColor, inter);
                
            fill(gradientColor);
            noStroke();
            rect(0, y, windowWidth, rectHeight2);
            }







            let c = lerpColor( yellowColor, blueColor, map(mouseY, 0, height, 0, 1));
            fill(c);
            noStroke();
            circle(mouseX, mouseY, 30);
        }

        function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}



    </script>
</body>
</html>

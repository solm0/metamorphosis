<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Thickness Control</title>
  <style>
    body {
      height: 200vh; /* 페이지의 세로 길이를 늘려 스크롤이 가능하게 함 */
      margin: 0;
    }

    .line {
      width: 100%;
      height: 2px;
      background-color: black;
      margin: 10px 0;
      transition: height 0.3s; /* 선의 높이에 변화가 생길 때의 애니메이션 설정 */
      position: fixed;
    }
  </style>
</head>
<body>
  <div class="line" id="line1"></div>
  <div class="line" id="line2"></div>
  <!-- 필요에 따라 더 많은 선을 추가할 수 있습니다 -->
  
  <script>

document.addEventListener('DOMContentLoaded', function () {
  // 선 요소들을 가져옴
  var line1 = document.getElementById('line1');
  var line2 = document.getElementById('line2');
  // 필요에 따라 더 많은 선을 추가할 수 있음

  // 스크롤 이벤트를 감지
  window.addEventListener('scroll', function () {
    // 현재 스크롤 위치를 가져옴
    var scrollPosition = window.scrollY;

    // 스크롤 위치에 따라 선의 두께를 조절
    line1.style.height = scrollPosition / 2 + 'px';
    line2.style.height = scrollPosition / 3 + 'px';
    // 필요에 따라 더 많은 선의 두께를 조절할 수 있음
  });
});

  </script>
</body>
</html>
